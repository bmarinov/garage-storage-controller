apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "garage-controller.serviceAccountName" . }}
  labels:
    {{- include "garage-controller.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: garage-controller-leader-election
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: garage-storage-controller
rules:
- apiGroups: [""]
  resources: [configmaps]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [coordination.k8s.io]
  resources: [leases]
  verbs: [get, list, watch, create, update, patch, delete]
- apiGroups: [""]
  resources: [events]
  verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: garage-controller-role
rules:
- apiGroups: [garage.getclustered.net]
  resources: [accesskeys, accesspolicies, buckets]
  verbs: [create, delete, get, list, patch, update, watch]
- apiGroups: [garage.getclustered.net]
  resources: [accesskeys/finalizers, accesspolicies/finalizers, buckets/finalizers]
  verbs: [update]
- apiGroups: [garage.getclustered.net]
  resources: [accesskeys/status, accesspolicies/status, buckets/status]
  verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: garage-controller-leader-election
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: garage-storage-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: garage-controller-leader-election
subjects:
- kind: ServiceAccount
  name: garage-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: garage-controller-rolebinding
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: garage-storage-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: garage-controller-role
subjects:
- kind: ServiceAccount
  name: garage-controller
