apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "garage-controller.serviceAccountName" . }}
  labels:
    {{- include "garage-controller.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "garage-controller.leaderElectionRoleName" . }}
  labels:
    {{- include "garage-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "garage-controller.clusterRoleName" . }}
rules:
  - apiGroups: [garage.getclustered.net]
    resources: [accesskeys, accesspolicies, buckets]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [garage.getclustered.net]
    resources: [accesskeys/finalizers, accesspolicies/finalizers, buckets/finalizers]
    verbs: [update]
  - apiGroups: [garage.getclustered.net]
    resources: [accesskeys/status, accesspolicies/status, buckets/status]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "garage-controller.leaderElectionRoleName" . }}
  labels:
    {{- include "garage-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "garage-controller.leaderElectionRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "garage-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "garage-controller.clusterRoleName" . }}
  labels:
    {{- include "garage-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "garage-controller.clusterRoleName" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "garage-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
